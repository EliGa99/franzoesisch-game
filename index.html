<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Vokabel Trainer & Multiplayer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Arial', sans-serif;
    background: linear-gradient(250deg, #20d1e1, #b638ff);
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  h1 { font-size: 3em; margin-bottom: 20px; text-shadow: 2px 2px #00000050; }

  button {
    padding: 15px 30px;
    margin: 10px;
    background: rgba(0,0,0,0.3);
    border: 2px solid #fff;
    color: #fff;
    cursor: pointer;
    border-radius: 10px;
    font-size: 1.4em;
    transition: all 0.2s ease;
  }
  button:hover { background: rgba(255,255,255,0.2); transform: scale(1.05); }

  #menu, #trainMenu, #trainerArea {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #trainMenu, #trainerArea { display: none; }

  .question { font-size: 2em; margin: 20px 0; text-align: center; }
  .answers button { width: 100%; margin: 5px 0; }
  .correct { background: #28a745 !important; }
  .wrong { background: #dc3545 !important; }
  #trainerScore { margin-top: 20px; font-size: 1.5em; }
</style>
</head>
<body>

<h1>Vokabel-Battle Menü</h1>

<!-- Hauptmenü -->
<div id="menu">
  <button onclick="checkServer()">Online spielen</button>
  <div id="status"></div>
</div>

<!-- Trainingsmenü -->
<div id="trainMenu">
  <h2>Übungsmodus wählen</h2>
  <button onclick="startMultipleChoice()">Multiple Choice</button>
  <button onclick="startWriting()">Schreiben</button>
  <button onclick="backToMenu()">Zurück</button>
</div>

<!-- Trainer -->
<div id="trainerArea">
  <div id="trainerQuestion" class="question"></div>
  <div id="trainerAnswers" class="answers"></div>
  <input id="writeInput" style="display:none; padding:10px; font-size:1.2em; width:80%; border-radius:10px;">
  <button id="submitWrite" style="display:none; margin-top:10px;" onclick="submitWriting()">Antwort prüfen</button>
  <div id="trainerScore">Punkte: 0</div>
  <button onclick="nextTrainerQuestion()">Nächste Frage</button>
  <button onclick="backToMenu()">Zurück</button>
</div>

<script>
// Multiplayer Server URL
const SERVER_URL = "https://unrepining-airtightly-jerrica.ngrok-free.dev";

// Vokabeln laden
let vocab = [];
fetch("/home/elias/Desktop/Digital_Classroom/fr-de.json")
  .then(r => r.json())
  .then(data => vocab = data);

// Menü Navigation
function showTrainMenu() {
  document.getElementById("menu").style.display = "none";
  document.getElementById("trainMenu").style.display = "flex";
}

function backToMenu() {
  document.getElementById("trainMenu").style.display = "none";
  document.getElementById("trainerArea").style.display = "none";
  document.getElementById("menu").style.display = "flex";
}

// Server Check
function checkServer() {
  document.getElementById("status").textContent = "Prüfe Server...";

  fetch(SERVER_URL, { method: "GET" })
    .then(() => {
      window.location.href = "https://unrepining-airtightly-jerrica.ngrok-free.dev/"; // Multiplayer Seite
    })
    .catch(() => {
      document.getElementById("status").textContent = "❌ Server offline!";
    });
}

// Trainer Variablen
let trainerIndex = 0;
let trainerScore = 0;
let trainerMode = "mc"; // mc = multiple choice, write = schreiben

// Multiple Choice starten
function startMultipleChoice() {
  trainerMode = "mc";
  trainerIndex = 0;
  trainerScore = 0;
  document.getElementById("trainerScore").textContent = "Punkte: 0";

  document.getElementById("trainMenu").style.display = "none";
  document.getElementById("trainerArea").style.display = "flex";

  nextTrainerQuestion();
}

// Schreiben starten
function startWriting() {
  trainerMode = "write";
  trainerIndex = 0;
  trainerScore = 0;
  document.getElementById("trainerScore").textContent = "Punkte: 0";

  document.getElementById("trainMenu").style.display = "none";
  document.getElementById("trainerArea").style.display = "flex";

  nextTrainerQuestion();
}

// Neue Frage
function nextTrainerQuestion() {
  const q = vocab[Math.floor(Math.random() * vocab.length)];

  document.getElementById("trainerQuestion").textContent = "Übersetze: " + q.fr;
  document.getElementById("trainerAnswers").innerHTML = "";
  document.getElementById("writeInput").style.display = "none";
  document.getElementById("submitWrite").style.display = "none";

  if (trainerMode === "mc") {
    showMultipleChoice(q);
  } else {
    showWriting(q);
  }
}

// Multiple Choice
function showMultipleChoice(q) {
  const answersDiv = document.getElementById("trainerAnswers");
  let answers = [q.de];

  while (answers.length < 4) {
    const rand = vocab[Math.floor(Math.random() * vocab.length)].de;
    if (!answers.includes(rand)) answers.push(rand);
  }

  answers.sort(() => Math.random() - 0.5);

  answers.forEach(a => {
    const btn = document.createElement("button");
    btn.textContent = a;
    btn.onclick = () => {
      if (a === q.de) {
        btn.classList.add("correct");
        trainerScore++;
      } else {
        btn.classList.add("wrong");
      }
      document.getElementById("trainerScore").textContent = "Punkte: " + trainerScore;
    };
    answersDiv.appendChild(btn);
  });
}

// Schreiben
let currentWriteAnswer = "";

function showWriting(q) {
  currentWriteAnswer = q.de;

  document.getElementById("trainerAnswers").innerHTML = "";
  document.getElementById("writeInput").value = "";
  document.getElementById("writeInput").style.display = "block";
  document.getElementById("submitWrite").style.display = "block";
}

function submitWriting() {
  const input = document.getElementById("writeInput").value.trim();
  if (input.toLowerCase() === currentWriteAnswer.toLowerCase()) {
    trainerScore++;
    alert("Richtig!");
  } else {
    alert("Falsch! Richtig wäre: " + currentWriteAnswer);
  }
  document.getElementById("trainerScore").textContent = "Punkte: " + trainerScore;
}
</script>
</body>
</html>
