<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Vokabel Trainer & Multiplayer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Arial', sans-serif;
    background: linear-gradient(250deg, #20d1e1, #b638ff);
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  h1 { font-size: 3em; margin-bottom: 20px; text-shadow: 2px 2px #00000050; }

  button {
    padding: 15px 30px;
    margin: 10px;
    background: rgba(0,0,0,0.3);
    border: 2px solid #fff;
    color: #fff;
    cursor: pointer;
    border-radius: 10px;
    font-size: 1.4em;
    transition: all 0.2s ease;
  }
  button:hover { background: rgba(255,255,255,0.2); transform: scale(1.05); }

  #menu, #trainMenu, #trainerArea {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #trainMenu, #trainerArea { display: none; }

  .question { font-size: 2em; margin: 20px 0; text-align: center; }
  .answers button { width: 100%; margin: 5px 0; }
  .correct { background: #28a745 !important; }
  .wrong { background: #dc3545 !important; }
  #trainerScore { margin-top: 20px; font-size: 1.5em; }
</style>
</head>
<body>

<h1>Vokabel-Battle Menü</h1>

<!-- Hauptmenü -->
<div id="menu">
  <button onclick="checkServer()">Online spielen</button>
  <button onclick="showTrainMenu()">Offline üben</button>
  <div id="status"></div>
</div>

<!-- Trainingsmenü -->
<div id="trainMenu">
  <h2>Übungsmodus wählen</h2>
  <button onclick="startMultipleChoice()">Multiple Choice</button>
  <button onclick="startWriting()">Schreiben</button>
  <button onclick="backToMenu()">Zurück</button>
</div>

<!-- Trainer -->
<div id="trainerArea">
  <div id="trainerQuestion" class="question"></div>
  <div id="trainerAnswers" class="answers"></div>
  <input id="writeInput" style="display:none; padding:10px; font-size:1.2em; width:80%; border-radius:10px;">
  <button id="submitWrite" style="display:none; margin-top:10px;" onclick="submitWriting()">Antwort prüfen</button>
  <div id="trainerScore">Punkte: 0</div>
  <button onclick="nextTrainerQuestion()">Nächste Frage</button>
  <button onclick="backToMenu()">Zurück</button>
</div>

<script>
// Multiplayer Server URL
const SERVER_URL = "https://unrepining-airtightly-jerrica.ngrok-free.dev";

// ⭐ Offline-Vokabeln
const vocab = [
  { "fr": "le matin", "de": "der Morgen" },
  { "fr": "l'après-midi", "de": "der Nachmittag" },
  { "fr": "un emploi du temps", "de": "ein Stundenplan" },
  { "fr": "l'histoire-géo", "de": "Geschichte und Erdkunde" },
  { "fr": "l'histoire", "de": "die Geschichte" },
  { "fr": "la géographie", "de": "Geographie, Erdkunde" },
  { "fr": "la récréation", "de": "die Pause in der Schule" },
  { "fr": "l'anglais", "de": "Englisch" },
  { "fr": "l'EPS", "de": "Sport (Schulfach)" },
  { "fr": "les maths", "de": "Mathe" },
  { "fr": "les SVT", "de": "Biologie und Geologie (Schulfach)" },
  { "fr": "la technologie", "de": "Technik" },
  { "fr": "les sciences physiques", "de": "Physik" },
  { "fr": "le latin", "de": "Latein" },
  { "fr": "les arts plastiques", "de": "Kunst (Schulfach)" },
  { "fr": "en (+ Fach)", "de": "in + Fach" },
  { "fr": "la cantine", "de": "die Kantine" },
  { "fr": "la permanence", "de": "beaufsichtigte Freiarbeit" },
  { "fr": "je ne peux pas", "de": "ich kann nicht" },
  { "fr": "Mais non!", "de": "Aber nein!, Nicht doch!" },
  { "fr": "le collège", "de": "die Schule" },
  { "fr": "la salle", "de": "der Unterrichtsraum" },
  { "fr": "la salle des profs", "de": "das Lehrerzimmer" },
  { "fr": "le CDI", "de": "die Schulbibliothek" },
  { "fr": "une info", "de": "eine Info" },
  { "fr": "le/la CPE", "de": "der/die Schulbetreuer/in" },
  { "fr": "la mission", "de": "die Mission" },
  { "fr": "le papier", "de": "das Papier" },
  { "fr": "aller", "de": "gehen" },
  { "fr": "le billet en retard", "de": "Nachweis über das Zuspätkommen" },
  { "fr": "la solution", "de": "die Lösung" },
  { "fr": "le point faible", "de": "der Schwachpunkt" },
  { "fr": "sévère", "de": "streng" },
  { "fr": "le/la principal/e", "de": "der/die Schulleiter/in" },
  { "fr": "organiser qc", "de": "etw. organisieren" },
  { "fr": "être pressé/pressée", "de": "in Eile sein" },
  { "fr": "le/la documentaliste", "de": "der/die Bibliothekar/in" },
  { "fr": "ranger qc", "de": "etw. aufräumen" },
  { "fr": "préparer qc", "de": "etw. vorbereiten" },
  { "fr": "un exposé", "de": "ein Vortrag" },
  { "fr": "oublier qc", "de": "etw. vergessen" },
  { "fr": "tout", "de": "alles" },
  { "fr": "le surveillant / la surveillante", "de": "die Aufsichtsperson" },
  { "fr": "surveiller qn/qc", "de": "jdn./etw. überwachen" },
  { "fr": "Attention!", "de": "Achtung!" },
  { "fr": "téléphoner", "de": "telefonieren" },
  { "fr": "manger qc", "de": "etw. essen" },
  { "fr": "même", "de": "sogar" },
  { "fr": "partout", "de": "überall" },
  { "fr": "notre/nos", "de": "unser/e" },
  { "fr": "votre/vos", "de": "euer/eure, Ihr/e" },
  { "fr": "leur/leurs", "de": "ihr/e" },
  { "fr": "Pourquoi...?", "de": "Warum ...?" },
  { "fr": "la carte", "de": "die Karte" },
  { "fr": "allemand/allemande", "de": "Deutsch" },
  { "fr": "le/la corres", "de": "der/die Brieffreund/in" },
  { "fr": "déjà", "de": "schon, bereits" },
  { "fr": "la journée", "de": "der Tag (Ablauf)" },
  { "fr": "ensuite", "de": "dann" },
  { "fr": "la matière", "de": "das Schulfach" },
  { "fr": "trop", "de": "total, voll" },
  { "fr": "bizarre", "de": "merkwürdig" },
  { "fr": "le cauchemar", "de": "der Albtraum" },
  { "fr": "la cour", "de": "der Schulhof" },
  { "fr": "le terrain", "de": "der Platz" },
  { "fr": "Ça dépend.", "de": "Es kommt darauf an." },
  { "fr": "avoir de la chance", "de": "Glück haben" },
  { "fr": "raconter sa vie", "de": "seine Lebensgeschichte erzählen" },
  { "fr": "râler", "de": "meckern, motzen" }
];


// Menü Navigation
function showTrainMenu() {
  document.getElementById("menu").style.display = "none";
  document.getElementById("trainMenu").style.display = "flex";
}

function backToMenu() {
  document.getElementById("trainMenu").style.display = "none";
  document.getElementById("trainerArea").style.display = "none";
  document.getElementById("menu").style.display = "flex";
}

// Server Check
function checkServer() {
  document.getElementById("status").textContent = "Prüfe Server...";

  fetch(SERVER_URL)
    .then(() => window.location.href = SERVER_URL)
    .catch(() => document.getElementById("status").textContent = "❌ Server offline!");
}

// Trainer Variablen
let trainerScore = 0;
let trainerMode = "mc";
let currentCorrectAnswer = "";

// Multiple Choice starten
function startMultipleChoice() {
  trainerMode = "mc";
  trainerScore = 0;
  document.getElementById("trainerScore").textContent = "Punkte: 0";
  document.getElementById("trainMenu").style.display = "none";
  document.getElementById("trainerArea").style.display = "flex";
  nextTrainerQuestion();
}

// Schreiben starten
function startWriting() {
  trainerMode = "write";
  trainerScore = 0;
  document.getElementById("trainerScore").textContent = "Punkte: 0";
  document.getElementById("trainMenu").style.display = "none";
  document.getElementById("trainerArea").style.display = "flex";
  nextTrainerQuestion();
}

// Neue Frage
function nextTrainerQuestion() {
  const q = vocab[Math.floor(Math.random() * vocab.length)];

  // ⭐ Jetzt wird DE angezeigt → FR muss geschrieben werden
  document.getElementById("trainerQuestion").textContent = "Französisch für: " + q.de;

  currentCorrectAnswer = q.fr;

  document.getElementById("trainerAnswers").innerHTML = "";
  document.getElementById("writeInput").style.display = "none";
  document.getElementById("submitWrite").style.display = "none";

  if (trainerMode === "mc") showMultipleChoice(q);
  else showWriting(q);
}

// Multiple Choice
function showMultipleChoice(q) {
  const answersDiv = document.getElementById("trainerAnswers");
  let answers = [q.fr];

  while (answers.length < 4) {
    const rand = vocab[Math.floor(Math.random() * vocab.length)].fr;
    if (!answers.includes(rand)) answers.push(rand);
  }

  answers.sort(() => Math.random() - 0.5);

  answers.forEach(a => {
    const btn = document.createElement("button");
    btn.textContent = a;
    btn.onclick = () => {
      if (a === q.fr) {
        btn.classList.add("correct");
        trainerScore++;
      } else {
        btn.classList.add("wrong");
      }
      document.getElementById("trainerScore").textContent = "Punkte: " + trainerScore;
    };
    answersDiv.appendChild(btn);
  });
}

// Schreiben
function showWriting(q) {
  document.getElementById("writeInput").value = "";
  document.getElementById("writeInput").style.display = "block";
  document.getElementById("submitWrite").style.display = "block";
}

// ⭐ Case-insensitive, aber Akzente & Apostrophe bleiben Pflicht
function submitWriting() {
  const input = document.getElementById("writeInput").value.trim();
  const correct = currentCorrectAnswer;

  if (input.toLowerCase() === correct.toLowerCase()) {
    trainerScore++;
    alert("Richtig!");
  } else {
    alert("Falsch! Richtig wäre: " + correct);
  }

  document.getElementById("trainerScore").textContent = "Punkte: " + trainerScore;
}
</script>
</body>
</html>
